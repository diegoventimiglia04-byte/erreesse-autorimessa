# Netlify build & redirect config
[build]
  publish = "."

# Redirect per la pagina admin (cartella con index.html)
[[redirects]]
  from  = "/admin"
  to    = "/admin/index.html"
  status = 200

# Header di sicurezza per il pannello admin
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
